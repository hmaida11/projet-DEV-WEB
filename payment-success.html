<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement réussi</title>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .success-card { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 500px; }
    .checkmark { width: 80px; height: 80px; background: #48bb78; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 40px; }
    .btn { padding: 12px 24px; background: #1a202c; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="checkmark">✓</div>
    <h2>Paiement réussi !</h2>
    <div id="loading">Finalisation de votre inscription...</div>
    <button id="redirect-btn" class="btn hidden" onclick="window.location.href='/login.html'">Se connecter</button>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const transactionId = urlParams.get('transaction_id');
    const userId = urlParams.get('user_id');
    async function confirmPayment() {
      if (!transactionId || !userId) return;
      try {
        await fetch('http://localhost:3000/api/payment/confirm', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ transaction_id: transactionId, user_id: userId }) });
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('redirect-btn').classList.remove('hidden');
      } catch(e) { console.error(e); }
    }
    confirmPayment();
  </script>
</body>
</html>
