<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement annulé - Faculté Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f7fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .cancel-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            border: 1px solid #e2e8f0;
        }
        .cross {
            width: 80px;
            height: 80px;
            background: #e53e3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }
        h2 { color: #1a202c; margin-bottom: 15px; }
        p { color: #718096; margin-bottom: 25px; }
        .btn { 
            padding: 12px 24px;
            background: #1a202c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #2d3748; }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cross">✗</div>
        <h2>Paiement annulé</h2>
        <p>Vous avez annulé le paiement. Vous pouvez réessayer quand vous voulez.</p>
        <button class="btn" onclick="window.location.href='login.html'">Réessayer l'inscription</button>
    </div>
</body>
</html>
