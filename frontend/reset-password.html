<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculté Connect - Réinitialisation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_auth.css">
</head>
<body>
    <div class="auth-card">
        <h2>Nouveau mot de passe</h2>
        <p class="subtitle">Choisissez votre nouveau mot de passe</p>
        
        <div id="reset-alert" class="alert hidden"></div>

        <form id="form-reset">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reset-email" required placeholder="Confirmez votre email">
            </div>
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="reset-pass" required minlength="6" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" id="reset-pass-confirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Mettre à jour</button>
            <a href="login.html" class="link-action">← Retour à la connexion</a>
        </form>
    </div>

    <script src="script_reset.js"></script>
</body>
</html>
